version: '3'

services:
  magento:
    image: ghcr.io/controlaltdelete-nl/magento2-in-a-box/magento-project-community-edition:${PHP_VERSION}-magento${MAGENTO_VERSION}-sample-data
    container_name: magento-project-community-edition
    environment:
      - VIRTUAL_HOST=magento.test
    volumes:
      - ../../../magento-logs:/data/var/log
      - ./magento/configure-channable.sh:/data/configure-channable.sh
      - ./magento/setup-tax-rules.php:/data/setup-tax-rules.php

  nginx-proxy:
    image: jwilder/nginx-proxy
    volumes:
      - ./nginx-proxy/proxy.conf:/etc/nginx/proxy.conf
      - ./nginx-proxy/magento.test.crt:/etc/nginx/certs/magento.test.crt
      - ./nginx-proxy/magento.test.key:/etc/nginx/certs/magento.test.key
      - /var/run/docker.sock:/tmp/docker.sock:ro
    ports:
      - 80:80
      - 443:443
